<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプトギャラリー｜500選</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>

  :root{--bg:#0d0d0f;--surface:#16161a;--surface2:#1e1e24;--border:rgba(255,255,255,0.07);--accent:#c8a96e;--text:#e8e6e1;--text-muted:#8a8880;--text-dim:#5a5856;--ok:#5cb87a;--r:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

  /* HEADER */
  header{position:sticky;top:0;z-index:100;background:rgba(13,13,15,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;gap:20px}
  .logo{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:600;color:var(--accent);letter-spacing:.05em;white-space:nowrap;flex-shrink:0}
  .logo span{color:var(--text-muted);font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:300;margin-left:8px}
  .search-wrap{flex:1;max-width:420px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
  #search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
  #search::placeholder{color:var(--text-dim)}
  #search:focus{border-color:var(--accent)}
  .hdr-right{margin-left:auto;flex-shrink:0}
  .count-badge{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--text-muted)}
  .count-badge strong{color:var(--accent);font-weight:500}

  /* LAYOUT */
  .layout{display:flex;min-height:calc(100vh - 64px)}

  /* SIDEBAR */
  aside{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;overflow-y:auto;position:sticky;top:64px;height:calc(100vh - 64px)}
  .sidebar-title{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--text-dim);padding:0 20px 10px;font-weight:400}
  .cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 20px;background:none;border:none;cursor:pointer;text-align:left;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;font-size:12px;font-weight:300;transition:all .15s;border-left:2px solid transparent}
  .cat-btn:hover{background:var(--surface2);color:var(--text)}
  .cat-btn.active{color:var(--accent);border-left-color:var(--accent);background:rgba(200,169,110,.06)}
  .cat-btn .cn{font-size:10px;color:var(--text-dim);min-width:24px;font-weight:400}
  .cat-btn .cc{margin-left:auto;font-size:10px;color:var(--text-dim);background:var(--surface2);padding:1px 6px;border-radius:10px}
  .cat-btn.active .cc{background:rgba(200,169,110,.15);color:var(--accent)}

  /* MAIN */
  main{flex:1;padding:32px;overflow-y:auto;min-width:0}
  .sec-hdr{margin-bottom:24px;display:flex;align-items:baseline;gap:12px}
  .sec-hdr h2{font-family:'Shippori Mincho',serif;font-size:22px;font-weight:600}
  .sec-hdr .sc{font-size:13px;color:var(--text-dim)}

  /* GRID */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

  /* CARD */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;display:flex;flex-direction:column;gap:12px;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0;transition:opacity .2s}
  .card:hover{border-color:rgba(200,169,110,.3);transform:translateY(-2px)}
  .card:hover::before{opacity:1}
  .card-meta{display:flex;align-items:center;gap:8px}
  .card-id{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}
  .card-cat{font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text-muted)}
  .card-prompt{font-size:13px;line-height:1.75;color:var(--text);font-weight:300}
  .card-prompt .br{color:var(--accent);font-weight:500}
  .supp{display:flex;flex-direction:column;gap:8px;padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:8px}
  .supp-row{display:flex;gap:8px;align-items:flex-start}
  .supp-lbl{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;color:var(--accent);white-space:nowrap;padding-top:1px;min-width:38px;letter-spacing:.03em}
  .supp-txt{font-size:11.5px;line-height:1.65;color:var(--text-muted);font-weight:300}
  .btn-copy{display:flex;align-items:center;gap:6px;background:rgba(200,169,110,.1);border:1px solid rgba(200,169,110,.2);color:var(--accent);border-radius:8px;padding:7px 14px;font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;width:100%;justify-content:center}
  .btn-copy:hover{background:rgba(200,169,110,.2);border-color:rgba(200,169,110,.4)}
  .btn-copy.ok{background:rgba(92,184,122,.15);border-color:rgba(92,184,122,.3);color:var(--ok)}

  /* ALL VIEW */
  .all-view .blk{margin-bottom:48px}
  .all-view .blk-hdr{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
  .all-view .blk-hdr h3{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:600}
  .blk-hdr .sn{font-size:12px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px}

  /* SEARCH INFO */
  .search-info{margin-bottom:20px;padding:12px 16px;background:var(--surface2);border-radius:8px;font-size:13px;color:var(--text-muted)}
  .search-info strong{color:var(--accent)}

  /* EMPTY */
  .empty{text-align:center;padding:80px 20px;color:var(--text-dim)}
  .empty p{font-size:14px}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  mark{background:rgba(200,169,110,.25);color:var(--accent);border-radius:2px;padding:0 1px}

  /* MOBILE */
  .cat-chips{display:none}

  @media(max-width:768px){
    header{height:52px;padding:0 14px;gap:10px}
    .logo{font-size:14px}
    .logo span{display:none}
    .search-wrap{display:none}
    .count-badge{font-size:11px;padding:3px 8px}
    .layout{flex-direction:column;min-height:calc(100vh - 52px)}
    aside{display:none}
    .cat-chips{display:flex;align-items:center;gap:8px;overflow-x:auto;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:90;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .cat-chips::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:300;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .15s}
    .chip.active{background:rgba(200,169,110,.15);border-color:rgba(200,169,110,.4);color:var(--accent)}
    main{padding:14px 12px 24px}
    .grid{grid-template-columns:1fr;gap:12px}
    .card{padding:14px}
    .card-prompt{font-size:12.5px}
    .supp-txt{font-size:11px}
    .supp{padding:10px 12px}
    .all-view .blk-hdr h3{font-size:15px}
    .sec-hdr h2{font-size:18px}
  }

</style>
</head>
<body>

<header>
  <div class="logo">プロンプトギャラリー<span>500選</span></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search" placeholder="プロンプトを検索…" autocomplete="off">
  </div>
  <div class="hdr-right">
    <div class="count-badge"><strong id="cnt">500</strong> / 500</div>
  </div>
</header>

<!-- スマホ用カテゴリチップ -->
<div class="cat-chips" id="chips"></div>

<div class="layout">
  <aside>
    <div class="sidebar-title">カテゴリー</div>
    <div id="cat-list"></div>
  </aside>
  <main>
    <div id="content"></div>
  </main>
</div>

<script>

const P=[{"i":1,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、北欧ミニマルデザインで表現。やわらかなニュートラルカラー、整った余白、シンプルな形、静かな自然光、洗練された温もり。"},{"i":2,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、無印良品の世界観のようなナチュラルミニマルスタイルで表現。生成りやベージュを基調に、素朴な素材感、落ち着いた空気感、控えめで上質な美しさ。"},{"i":3,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、ジャパンディスタイルで表現。北欧のぬくもりと和の静けさを融合し、木や麻の自然素材、余白を生かした構成、穏やかで整った雰囲気。"},{"i":4,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、静かな和モダンスタイルで表現。白・墨色・木目を基調に、端正な構図、落ち着いた陰影、品のある簡潔さと凛とした空気感。"},{"i":5,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、ホテルライクなミニマルラグジュアリースタイルで表現。淡いグレージュ、整然としたレイアウト、やわらかな間接光、上品で清潔感のある高級感。"},{"i":6,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、柔らかなオーガニックミニマルスタイルで表現。曲線的なフォルム、自然素材の質感、くすみ系カラー、静かで心地よい空間美。"},{"i":7,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、余白を主役にしたアートミニマルスタイルで表現。要素を絞った構成、繊細なバランス、静寂を感じる画面設計、洗練された美術館のような空気。"},{"i":8,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、ベージュトーンの韓国ナチュラルインテリア風で表現。やさしい光、やわらかい布の質感、抜け感のある構図、穏やかでおしゃれな日常感。"},{"i":9,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、シンプルなライフスタイルブランド広告のように表現。控えめな色使い、清潔感のある背景、自然な光、静かにセンスが伝わる見せ方。"},{"i":10,"s":1,"c":"ミニマル・ナチュラル系","p":"【】を、空気感のあるナチュラルフォトスタイルで表現。白を基調にした明るいトーン、さりげない影、軽やかな抜け感、飾りすぎない上質さ。"},{"i":11,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、韓国っぽい淡色ポップスタイルで表現。ミルキーなパステルカラー、丸みのある形、やわらかな光、可愛く洗練された雰囲気。"},{"i":12,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、韓国カフェ風のエアリースタイルで表現。アイボリーやくすみピンクを基調に、ふんわりした光、甘すぎない可愛さ、やさしく垢抜けた印象。"},{"i":13,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、バタークリームのような淡色フェミニンスタイルで表現。やわらかなベージュやクリーム色、ふわっとした質感、上品で愛らしい空気感。"},{"i":14,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、韓国雑貨ブランド風の洗練ポップスタイルで表現。小さく整ったモチーフ、やさしいカラーリング、すっきりした画面、可愛いのに大人っぽい雰囲気。"},{"i":15,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、淡色インスタ投稿のようなスタイルで表現。くすみカラー、自然な抜け感、やわらかな光、トレンド感のある軽やかで親しみやすい見た目。"},{"i":16,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、韓国っぽいナチュラルガーリースタイルで表現。白やベージュを中心に、繊細な小物感、ふんわりした陰影、素直でやさしい可愛さ。"},{"i":17,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、ソフトピーチトーンの韓国ビジュアルで表現。やわらかいピンクベージュ、透けるような明るさ、清楚で今っぽい洗練感。"},{"i":18,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、韓国フォトブース風のポップミニマルスタイルで表現。クリーンな背景、控えめな色遊び、コンパクトで整った構図、可愛く現代的なムード。"},{"i":19,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、ゆるく洗練された韓国ブランドルックで表現。甘さを抑えた淡色、自然体の抜け感、素朴さとおしゃれ感のバランスが取れた見た目。"},{"i":20,"s":2,"c":"韓国・淡色・やわらか系","p":"【】を、ミルキーカラーの韓国トレンドスタイルで表現。白みの強い色合い、なめらかな質感、やさしい明るさ、軽くて可愛い世界観。"},{"i":21,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、ラグジュアリーブランド広告のように表現。深みのある色彩、計算された光、無駄のない構図、静かで圧倒的な高級感。"},{"i":22,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、ハイブランドのビジュアルキャンペーン風に表現。重厚な陰影、洗練された余白、凛とした存在感、モードで気品のある世界観。"},{"i":23,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、ゴールドアクセントの上質ラグジュアリースタイルで表現。黒やアイボリーを基調に、控えめな輝き、品のある華やかさ、特別感のある見た目。"},{"i":24,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、洗練されたジュエリーブランド風に表現。繊細な反射、上品な光沢、静けさのある高級感、細部まで美しい質感表現。"},{"i":25,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、プレミアムコスメ広告のように表現。なめらかな質感、艶のあるライティング、上質な色気、クリーンでリッチな印象。"},{"i":26,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、ラグジュアリーホテルのキービジュアル風で表現。落ち着いたトーン、やわらかな間接照明、気品ある静寂、余裕を感じる高級感。"},{"i":27,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、モノトーンラグジュアリースタイルで表現。黒・白・グレーの階調を生かし、シャープな陰影、都会的で洗練された迫力。"},{"i":28,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、サテンやベルベットの質感を感じるグラマラススタイルで表現。やわらかな艶、深い色合い、官能的すぎず上品な華やかさ。"},{"i":29,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、クラシックなヨーロピアンラグジュアリースタイルで表現。重厚な装飾美、深みのある色、優雅な陰影、歴史と気品を感じる雰囲気。"},{"i":30,"s":3,"c":"高級感・ラグジュアリー系","p":"【】を、洗練されたブラックカード広告のように表現。余計な要素を削ぎ落とし、圧倒的な存在感、静かな威圧感、ミニマルなのに贅沢な見た目。"},{"i":31,"s":4,"c":"ポップ・カラフル系","p":"【】を、カラフルポップアートスタイルで表現。鮮やかな配色、弾けるような明るさ、遊び心のある形、元気で印象に残るビジュアル。"},{"i":32,"s":4,"c":"ポップ・カラフル系","p":"【】を、キャンディカラーのポップデザインで表現。ピンク・ブルー・イエローの軽快な色使い、丸みのある形、楽しくハッピーな雰囲気。"},{"i":33,"s":4,"c":"ポップ・カラフル系","p":"【】を、90年代ポップカルチャー風で表現。大胆な色面、リズミカルな模様、レトロで楽しい勢い、少し懐かしくてキャッチーな世界観。"},{"i":34,"s":4,"c":"ポップ・カラフル系","p":"【】を、トイデザインのようなカラフルスタイルで表現。つるんとした質感、丸いフォルム、明快な配色、無邪気で親しみやすい見た目。"},{"i":35,"s":4,"c":"ポップ・カラフル系","p":"【】を、ビビッドなポップ広告スタイルで表現。強いコントラスト、目を引く色、躍動感のある構図、楽しく勢いのある仕上がり。"},{"i":36,"s":4,"c":"ポップ・カラフル系","p":"【】を、レトロポップな雑誌表紙風で表現。明るい色面、遊び心のあるレイアウト、少し懐かしい可愛さ、軽快で印象的な雰囲気。"},{"i":37,"s":4,"c":"ポップ・カラフル系","p":"【】を、ポップでクリーンなZ世代向けブランド風に表現。鮮明なカラー、シンプルな形、抜け感のあるデザイン、今っぽく親しみやすいムード。"},{"i":38,"s":4,"c":"ポップ・カラフル系","p":"【】を、パステルポップイラストスタイルで表現。やわらかい色彩、親しみやすいタッチ、軽快なレイアウト、可愛くてやさしい印象。"},{"i":39,"s":4,"c":"ポップ・カラフル系","p":"【】を、ネオポップアートスタイルで表現。大胆な配色、現代的なグラフィック感、強い視線誘導、アート性とキャッチーさの両立。"},{"i":40,"s":4,"c":"ポップ・カラフル系","p":"【】を、ポップなステッカーデザイン風で表現。輪郭のはっきりした形、明るい色使い、軽い遊び心、SNS映えする元気な見た目。"},{"i":41,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、ヴィンテージポスター風で表現。少し色褪せたトーン、紙の風合い、時代を感じる配色、味わい深く印象的な雰囲気。"},{"i":42,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、昭和レトロな広告デザイン風で表現。温かみのある色、少し懐かしい空気感、親しみやすい構図、レトロで味のある見た目。"},{"i":43,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、1960年代の雑誌グラフィック風で表現。大胆なレイアウト、クラシカルな色合い、時代感のあるおしゃれさ、懐かしくも新鮮な印象。"},{"i":44,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、70年代のレトロモダンスタイルで表現。マスタード、ブラウン、オレンジ系の色味、幾何学的な形、温かく個性的な世界観。"},{"i":45,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、クラシックなフィルム写真風で表現。やわらかな粒子感、自然な色褪せ、ノスタルジックな光、静かで情緒的な雰囲気。"},{"i":46,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、アンティーク絵葉書のように表現。古紙の質感、控えめな彩度、やさしいかすれ、時を経た温もりのある見た目。"},{"i":47,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、古い洋書の挿絵風で表現。落ち着いた色調、繊細な描写、紙の風合い、知的で物語性のあるクラシカルな印象。"},{"i":48,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、レトロシネマポスター風で表現。ドラマチックな構図、ややくすんだ色味、映画的な余韻、印象に残る古典的な魅力。"},{"i":49,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、ヴィンテージラベルデザイン風で表現。装飾的なフレーム、歴史を感じる色合い、上品なかすれ感、クラフト感のある仕上がり。"},{"i":50,"s":5,"c":"レトロ・ヴィンテージ系","p":"【】を、ノスタルジックな喫茶店ポスター風で表現。温かみのある色、少し懐かしい明るさ、やさしく親しみやすい昭和の空気感。"},{"i":51,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、手書き風の絵本スタイルで表現。やさしい線、ぬくもりのある色彩、少しラフな質感、物語を感じるあたたかな雰囲気。"},{"i":52,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、水彩画スタイルで表現。にじみやぼかしを生かした色使い、軽やかな透明感、やわらかく詩的な空気感。"},{"i":53,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、アクリル絵の具で描いたようなスタイルで表現。はっきりした筆致、重なりのある色面、手仕事感のある温かな迫力。"},{"i":54,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、油絵風のクラシカルアートスタイルで表現。重厚な色の重なり、立体感のある筆跡、深みと存在感のある美術作品のような雰囲気。"},{"i":55,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、色鉛筆イラスト風で表現。やさしい線の重なり、紙のざらつき、素朴で親しみやすい手描き感。"},{"i":56,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、パステル画風で表現。ふんわりした発色、やわらかな境界、夢のように軽い空気感、やさしく淡い美しさ。"},{"i":57,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、木版画風のアートスタイルで表現。彫りの跡を感じる線、素朴で力強い面の表現、手工芸のような温かみ。"},{"i":58,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、リソグラフ印刷風で表現。少しズレた版ズレ感、限られた色数、紙に刷ったようなざらつき、レトロでおしゃれな印象。"},{"i":59,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、コラージュアート風で表現。紙を切り貼りしたような質感、レイヤー感のある構成、遊び心とアート性のある見た目。"},{"i":60,"s":6,"c":"アート・絵画・クラフト系","p":"【】を、スケッチブックに描いたようなラフアートスタイルで表現。描き途中のような自然さ、自由な線、肩の力が抜けたおしゃれな雰囲気。"},{"i":61,"s":7,"c":"未来・テック・サイバー系","p":"【】を、ホログラムUIが浮かぶ未来空間として表現。透明なインターフェース、発光ライン、クリーンな背景、先進的で知的な見た目。"},{"i":62,"s":7,"c":"未来・テック・サイバー系","p":"【】を、サイバーパンクスタイルで表現。ネオンの光、濃い陰影、都市的な密度感、刺激的でクールな未来世界。"},{"i":63,"s":7,"c":"未来・テック・サイバー系","p":"【】を、近未来のテックブランド広告風で表現。シャープなフォルム、青白い発光、無機質で洗練された高機能感。"},{"i":64,"s":7,"c":"未来・テック・サイバー系","p":"【】を、デジタルインターフェースデザイン風で表現。情報レイヤーが重なる構成、透明感のある表示、知的で先端的な世界観。"},{"i":65,"s":7,"c":"未来・テック・サイバー系","p":"【】を、SF映画のワンシーンのように表現。壮大な光、未来的な構造物、ドラマチックな奥行き、非日常感のある迫力。"},{"i":66,"s":7,"c":"未来・テック・サイバー系","p":"【】を、ネオンミニマルスタイルで表現。暗い背景に鮮やかな発光色、余白を生かした構成、静かでクールな未来感。"},{"i":67,"s":7,"c":"未来・テック・サイバー系","p":"【】を、AIスタートアップのブランドビジュアル風で表現。クリーンなグラデーション、スマートな光、洗練された先進性、信頼感のあるハイテク感。"},{"i":68,"s":7,"c":"未来・テック・サイバー系","p":"【】を、メタバース空間のようなスタイルで表現。浮遊感のある構図、光る輪郭、デジタルな奥行き、没入感のある未来的な雰囲気。"},{"i":69,"s":7,"c":"未来・テック・サイバー系","p":"【】を、サイバーグラフィックポスター風で表現。幾何学的な光、硬質なコントラスト、エッジの効いたモード感、視覚的インパクトの強い見た目。"},{"i":70,"s":7,"c":"未来・テック・サイバー系","p":"【】を、クリーンSFスタイルで表現。白やシルバーを基調に、滑らかな曲面、精密で無駄のないデザイン、上品な未来感。"},{"i":71,"s":8,"c":"ファッション・モード系","p":"【】を、ハイファッション誌の表紙風で表現。大胆な構図、洗練された陰影、強い存在感、都会的でモードな雰囲気。"},{"i":72,"s":8,"c":"ファッション・モード系","p":"【】を、モードブランドのルックブック風で表現。静かな迫力、計算された余白、落ち着いた色調、感度の高い洗練感。"},{"i":73,"s":8,"c":"ファッション・モード系","p":"【】を、パリコレのバックステージフォト風で表現。生っぽい空気感、自然な緊張感、ファッションの臨場感と洗練を両立した見た目。"},{"i":74,"s":8,"c":"ファッション・モード系","p":"【】を、エディトリアルファッションスタイルで表現。アート性のある構図、光と影のコントラスト、個性的で印象に残るビジュアル。"},{"i":75,"s":8,"c":"ファッション・モード系","p":"【】を、ニューヨークストリートモード風で表現。都会的なエネルギー、シャープな色使い、無造作なのに決まっている雰囲気。"},{"i":76,"s":8,"c":"ファッション・モード系","p":"【】を、ミニマルモードスタイルで表現。モノトーンを基調に、直線的な美しさ、削ぎ落とされた存在感、静かで強い印象。"},{"i":77,"s":8,"c":"ファッション・モード系","p":"【】を、洗練されたセレクトショップ広告風で表現。抜け感のあるスタイリング、柔らかい光、今っぽく自然体なおしゃれ感。"},{"i":78,"s":8,"c":"ファッション・モード系","p":"【】を、ヴィンテージファッションエディトリアル風で表現。少し色褪せた質感、クラシカルなムード、懐かしさと洗練が共存する見た目。"},{"i":79,"s":8,"c":"ファッション・モード系","p":"【】を、都会的なラグジュアリーモードスタイルで表現。上質な素材感、硬質な陰影、クールで凛とした高級感。"},{"i":80,"s":8,"c":"ファッション・モード系","p":"【】を、雑誌特集ページのようなスタイルで表現。ストーリーを感じる構図、洗練されたトーン、感度の高い編集的なおしゃれさ。"},{"i":81,"s":9,"c":"料理・商品・広告系","p":"【】を、上質なグルメ広告のように表現。食材の質感を美しく見せる光、食欲をそそる色、洗練された盛り付け感。"},{"i":82,"s":9,"c":"料理・商品・広告系","p":"【】を、プレミアムフードブランドの広告風で表現。みずみずしい質感、深みのある色彩、丁寧で上品なシズル感。"},{"i":83,"s":9,"c":"料理・商品・広告系","p":"【】を、カフェメニュー写真のようなスタイルで表現。自然光のやさしさ、温かみのある色、気取らないおしゃれ感、見て心地いい雰囲気。"},{"i":84,"s":9,"c":"料理・商品・広告系","p":"【】を、洗練されたEC商品写真風で表現。背景をすっきり整え、商品の形と質感を明快に見せる、清潔感と信頼感のあるビジュアル。"},{"i":85,"s":9,"c":"料理・商品・広告系","p":"【】を、ナチュラルコスメの商品広告風で表現。やわらかな光、植物由来を感じる色味、清潔感とやさしさを備えた上品な仕上がり。"},{"i":86,"s":9,"c":"料理・商品・広告系","p":"【】を、クラフトブランドの商品紹介風で表現。手作業のぬくもり、素材感の見える描写、素朴で上質な空気感。"},{"i":87,"s":9,"c":"料理・商品・広告系","p":"【】を、SNS映えするフードフォト風で表現。鮮やかな色、ほどよい立体感、テンポのよい構図、思わず目を止めたくなる華やかさ。"},{"i":88,"s":9,"c":"料理・商品・広告系","p":"【】を、デパ地下の高級スイーツ広告風で表現。つややかな質感、繊細なディテール、上品な甘さと特別感が伝わる見た目。"},{"i":89,"s":9,"c":"料理・商品・広告系","p":"【】を、ミニマルな商品カタログ風で表現。主役を明確に見せる構成、整った余白、質感重視のライティング、誠実で美しい印象。"},{"i":90,"s":9,"c":"料理・商品・広告系","p":"【】を、プレゼント需要を感じるギフト広告風で表現。丁寧に整えられた構図、やわらかな高級感、特別な瞬間を想像させる上品な華やかさ。"},{"i":91,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、幻想的なファンタジースタイルで表現。やわらかな光の粒、夢のような色彩、神秘的で美しい空気感。"},{"i":92,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、童話のワンシーンのように表現。やさしい光、物語を感じる背景、詩的で温かなファンタジー感。"},{"i":93,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、シネマティックスタイルで表現。映画のような光と影、奥行きのある構図、感情を引き立てるドラマチックな雰囲気。"},{"i":94,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、夜明けの魔法のようなスタイルで表現。淡く差し込む光、繊細な空気の粒子、静かで神秘的な美しさ。"},{"i":95,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、星屑が舞う幻想世界として表現。青や紫を基調に、きらめく光、浮遊感のある構図、夢見心地な空気感。"},{"i":96,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、ダークファンタジースタイルで表現。深い影、神秘的な光、重厚で少し妖しい美しさ、物語性のある世界観。"},{"i":97,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、エモーショナルな映画ポスター風で表現。余韻を感じる色調、印象的な光、感情が伝わるドラマ性の高い構図。"},{"i":98,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、夕暮れのノスタルジックシネマ風で表現。オレンジや紫の空気感、やわらかな逆光、切なさと美しさが同居する見た目。"},{"i":99,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、夢の中のようなドリーミースタイルで表現。ぼんやりとした発光、淡いグラデーション、現実と非現実の間にあるような柔らかい幻想感。"},{"i":100,"s":10,"c":"幻想・シネマ・世界観重視系","p":"【】を、壮大な物語のキービジュアルのように表現。スケール感のある構図、ドラマチックな光、見る人の想像を広げる印象的な世界観。"},{"i":101,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、透明感のあるクリーンスタイルで表現。白を基調にした明るい色調、澄んだ空気感、やわらかな光、清潔感のある洗練された見た目。"},{"i":102,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、ガラスのようなクリアビジュアルで表現。透け感のある質感、淡い反射、静かな光、軽やかで現代的な美しさ。"},{"i":103,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、朝の光に包まれたエアリースタイルで表現。やわらかな逆光、白っぽいトーン、ふんわりとした抜け感、爽やかで心地よい雰囲気。"},{"i":104,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、ピュアホワイトのミニマルクリーンスタイルで表現。白と淡いグレーを中心に、無駄のない構図、澄んだ印象、静かで美しい整然さ。"},{"i":105,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、化粧水広告のような透明感スタイルで表現。みずみずしい質感、やわらかな発光感、清楚で清潔な空気感、軽く上品な美しさ。"},{"i":106,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、淡いブルーホワイトのクールクリーンスタイルで表現。涼やかな色調、なめらかな質感、シャープすぎない洗練感、爽やかな知性。"},{"i":107,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、クリアなライフスタイルブランド風で表現。明るい余白、整った配置、自然な光、誠実さとおしゃれさが両立した見た目。"},{"i":108,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、雨上がりのような透明感スタイルで表現。しっとりした空気感、やわらかな反射、淡い光、澄んだ余韻のある美しさ。"},{"i":109,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、シルクのようにやわらかなクリーンスタイルで表現。なめらかな質感、白を中心にした上品な配色、軽やかで繊細な雰囲気。"},{"i":110,"s":11,"c":"透明感・クリーン・軽やか系","p":"【】を、無垢で静かなピュアビジュアルスタイルで表現。飾りを抑えた構成、淡い色の重なり、静謐で美しい透明感。"},{"i":111,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、ボタニカルナチュラルスタイルで表現。グリーンを基調に、植物の生命感、自然光のやさしさ、心が落ち着く爽やかな雰囲気。"},{"i":112,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、森の中のようなオーガニックスタイルで表現。木漏れ日、深呼吸したくなる空気感、自然素材の質感、穏やかでやさしい世界観。"},{"i":113,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、ハーブや植物図鑑のようなスタイルで表現。繊細な植物モチーフ、ナチュラルな色合い、上品な知性、静かな美しさ。"},{"i":114,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、癒し系スパブランドのビジュアル風で表現。グリーンやアースカラー、やわらかな光、清らかな自然感、リラックスできる洗練感。"},{"i":115,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、ナチュラルガーデンスタイルで表現。草花のやさしい彩り、自然体の美しさ、軽やかな風を感じる穏やかな雰囲気。"},{"i":116,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、森林浴のようなヒーリングスタイルで表現。やわらかな緑の階調、自然の静けさ、落ち着きと再生を感じる空気感。"},{"i":117,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、ドライフラワーをあしらったボタニカルスタイルで表現。くすみカラー、繊細な植物の質感、ナチュラルで上品な温もり。"},{"i":118,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、自然派ブランドのパッケージビジュアル風で表現。クラフト感、葉や花のやさしい印象、清潔感のあるオーガニックな見た目。"},{"i":119,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、苔や木の質感を感じるアースナチュラルスタイルで表現。深みのある緑と茶色、落ち着いた光、静かで安定感のある雰囲気。"},{"i":120,"s":12,"c":"ボタニカル・自然・癒し系","p":"【】を、野原の風を感じるナチュラルポエティックスタイルで表現。草花の軽やかさ、自然光の広がり、やさしく心地よい美しさ。"},{"i":121,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、トロピカルリゾートスタイルで表現。明るい日差し、ターコイズブルー、南国の植物、開放感あふれる華やかな雰囲気。"},{"i":122,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、ビーチクラブのようなサマースタイルで表現。白と青を基調に、まぶしい光、リゾート感のある抜け感、爽快で洗練された空気。"},{"i":123,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、海辺のライフスタイルブランド風で表現。砂浜の明るさ、ナチュラルな質感、風を感じる軽やかさ、自然体でおしゃれな雰囲気。"},{"i":124,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、サンセットビーチスタイルで表現。夕日のオレンジやピンク、やわらかな逆光、ロマンチックで開放的な空気感。"},{"i":125,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、ハワイアンリラックススタイルで表現。やわらかな海色、南国のぬくもり、肩の力が抜けた穏やかなリゾート感。"},{"i":126,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、トロピカルポップスタイルで表現。鮮やかな植物色、陽気な明るさ、元気で楽しいサマー感、軽快なビジュアル。"},{"i":127,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、ボヘミアンビーチスタイルで表現。生成りやサンドカラー、ラフな素材感、自由で抜け感のある夏の空気感。"},{"i":128,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、海風を感じるコースタルスタイルで表現。白、淡いブルー、流木のような自然素材感、涼しげで心地よい雰囲気。"},{"i":129,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、プールサイドラグジュアリースタイルで表現。きらめく水面、強すぎない高級感、明るい日差し、都会的なリゾート感。"},{"i":130,"s":13,"c":"ビーチ・トロピカル・サマー系","p":"【】を、夏のバカンス広告のように表現。軽快な色彩、弾むような明るさ、開放感、見ているだけで気分が上がる爽やかさ。"},{"i":131,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、ゴシックスタイルで表現。深い黒を基調に、繊細な装飾、静かな荘厳さ、神秘的で重厚な美しさ。"},{"i":132,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、ダークロマンティックスタイルで表現。黒、ボルドー、深い紫を用い、気品と妖しさが共存するドラマチックな雰囲気。"},{"i":133,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、ミステリアスな月夜のスタイルで表現。青みがかった暗さ、淡い月光、静かな緊張感、幻想的で奥行きのある空気感。"},{"i":134,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、クラシカルゴシック建築風のスタイルで表現。尖塔や装飾的な陰影、重みのある空気感、荘厳で印象深い見た目。"},{"i":135,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、ダークエレガンススタイルで表現。漆黒とシルバーを基調に、シャープな陰影、静かな威厳、上品で謎めいた雰囲気。"},{"i":136,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、退廃的な美しさを感じるダークアートスタイルで表現。くすんだ色彩、深い影、儚さと存在感が同居する世界観。"},{"i":137,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、ヴィクトリアンゴシック風で表現。レースのような繊細さ、アンティーク感、重厚なムード、気高くミステリアスな印象。"},{"i":138,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、霧に包まれたダークファンタジースタイルで表現。かすんだ背景、低彩度の色調、神秘と緊張感が漂う世界観。"},{"i":139,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、黒い花を思わせるダークボタニカルスタイルで表現。深い色味、繊細な植物モチーフ、妖艶で上品な静けさ。"},{"i":140,"s":14,"c":"ダーク・ゴシック・ミステリアス系","p":"【】を、静かなサスペンス映画のようなスタイルで表現。光と影の強い対比、張りつめた空気、物語を感じる不穏で美しい雰囲気。"},{"i":141,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、インダストリアルデザインスタイルで表現。コンクリート、鉄、無機質な素材感、機能美を感じる無骨で洗練された雰囲気。"},{"i":142,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、ブルックリンインテリア風で表現。レンガや金属の質感、落ち着いた色味、ラフで都会的なおしゃれ感。"},{"i":143,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、ファクトリーシックスタイルで表現。工場的な構造美、直線的なデザイン、渋い色合い、力強くクールな印象。"},{"i":144,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、コンクリートミニマルスタイルで表現。グレーを中心にした硬質な世界観、削ぎ落とされた構図、静かで無骨な美しさ。"},{"i":145,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、メタル＆スチールのテックインダストリアル風で表現。銀色の反射、精密さを感じる質感、硬派で先進的な雰囲気。"},{"i":146,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、ワークショップスタイルで表現。道具や素材のリアルな質感、実用性のある空気感、手を動かす現場の無骨な魅力。"},{"i":147,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、倉庫リノベ風スタイルで表現。広がりのある空間、粗い質感、少しラフな光、都会的で男前な印象。"},{"i":148,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、メカニカルデザイン風で表現。構造の面白さ、無駄のない機能感、硬質で緻密なビジュアル。"},{"i":149,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、スモーキーなインダストリアルアート風で表現。鈍い光、重さのある空気感、荒々しさと美しさを兼ね備えた見た目。"},{"i":150,"s":15,"c":"工業・インダストリアル・無骨系","p":"【】を、モダン工業デザイン広告風で表現。強い素材感、端正なレイアウト、機能と美しさが共存する洗練された無骨さ。"},{"i":151,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、ハンドメイド雑貨のようなクラフトスタイルで表現。紙や布のやさしい質感、ぬくもりのある色、手作り感のある親しみやすい雰囲気。"},{"i":152,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、切り絵アート風で表現。紙を重ねたような立体感、シンプルな色面、繊細で温かな手仕事感。"},{"i":153,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、ペーパークラフトスタイルで表現。紙で組み立てたような形、軽やかな立体感、可愛く整った質感。"},{"i":154,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、スクラップブック風で表現。切り抜き、紙片、手書き感のある装飾、楽しく温かなコラージュ感。"},{"i":155,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、スタンプアート風で表現。少しかすれた印影、素朴な輪郭、手作業の味わい、親しみやすいレトロ感。"},{"i":156,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、フェルト小物のようなスタイルで表現。やわらかな素材感、丸みのある形、ほっこりとした可愛らしさ。"},{"i":157,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、刺繍作品のように表現。糸の立体感、布の質感、やさしい手仕事の温もり、細やかで愛らしい雰囲気。"},{"i":158,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、マスキングテープで飾った紙ものスタイルで表現。文具感のある可愛さ、軽やかな色遊び、手帳のような親密さ。"},{"i":159,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、クラフトペーパーのパッケージデザイン風で表現。茶色い紙の自然な風合い、素朴で誠実な印象、温かなナチュラル感。"},{"i":160,"s":16,"c":"クラフト・ハンドメイド・紙もの系","p":"【】を、手作りカードのようなスタイルで表現。やさしい色合い、紙の温度感、気持ちが伝わるあたたかなデザイン。"},{"i":161,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、モノクロームアートスタイルで表現。白と黒の強いコントラスト、形の美しさを際立たせる、洗練された静かな迫力。"},{"i":162,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、シンプルな線画イラストスタイルで表現。最小限の線、余白を生かした構成、軽やかで知的な美しさ。"},{"i":163,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、ペン画スケッチ風で表現。繊細な線の重なり、手描きの味わい、クラシカルで落ち着いた雰囲気。"},{"i":164,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、インクドローイング風で表現。濃淡のある線、少しラフな筆致、アート性の高い力強い見た目。"},{"i":165,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、モノクロポスター風で表現。大胆な構図、削ぎ落としたデザイン、視線を引きつけるグラフィックな印象。"},{"i":166,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、版画のような白黒グラフィックスタイルで表現。力強い明暗、手仕事感のある線、印象的でアーティスティックな雰囲気。"},{"i":167,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、建築ドローイング風で表現。精密な線、理知的な整然さ、構造美を感じるクリーンな見た目。"},{"i":168,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、漫画のモノクロ原稿風で表現。インクの強弱、メリハリのある白黒、躍動感と情報性のあるビジュアル。"},{"i":169,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、タイポグラフィポスターのようなグラフィックスタイルで表現。整理された構図、白黒の美しいコントラスト、都会的で強い印象。"},{"i":170,"s":17,"c":"モノクロ・線画・グラフィック系","p":"【】を、シルエットアート風で表現。輪郭を主役にした構成、余白の美しさ、シンプルで記憶に残る表現。"},{"i":171,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、ジオメトリックデザインスタイルで表現。円・三角・四角などの図形を生かし、整った構成、モダンで知的な印象。"},{"i":172,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、抽象アートスタイルで表現。形や色の関係性を重視し、自由で感覚的、洗練された現代アートのような見た目。"},{"i":173,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、幾何学ミニマルスタイルで表現。図形の繰り返し、整然とした余白、静かでスマートな美しさ。"},{"i":174,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、バウハウス風デザインで表現。シンプルな形、機能美、赤・青・黄をアクセントにした知的で洗練された構成。"},{"i":175,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、モダンアブストラクトポスター風で表現。大胆な色面、計算された配置、アート性とデザイン性を兼ね備えた見た目。"},{"i":176,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、流線形の抽象ビジュアルで表現。なめらかな曲線、やわらかなグラデーション、未来的で美しいリズム感。"},{"i":177,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、パターンデザイン風で表現。規則性のある繰り返し、装飾的なリズム、整っていて見飽きない美しさ。"},{"i":178,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、カラーブロックデザインで表現。大きな色面の切り替え、明快な構成、現代的で力強いグラフィック感。"},{"i":179,"s":18,"c":"ジオメトリック・抽象・デザイン系","p":"【】を、メンフィスデザイン風で表現。幾何学模様、ポップな色彩、遊び心のある構成、楽しさとデザイン性の両立。"},{"i":180,"s":18,"c":"ジオメ let cat='all',q='';
const cats=[],catMap={};
P.forEach(p=>{if(!catMap[p.c]){catMap[p.c]=[];cats.push({name:p.c,sec:p.s})}catMap[p.c].push(p)});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function hl(s,q){if(!q)return esc(s);const e=esc(s),r=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return e.replace(new RegExp(r,'gi'),m=>`<mark>${m}</mark>`)}
function fmt(p,q){let h=hl(p,q);return h.replace(/【】/g,'<span class="br">【　　】</span>')}
function uActive(){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat&&!q));
  document.querySelectorAll('.chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat&&!q));
}
function filtered(){
  let items=cat==='all'?P:catMap[cat]||[];
  if(q){const lq=q.toLowerCase();items=P.filter(p=>p.p.toLowerCase().includes(lq)||p.c.toLowerCase().includes(lq))}
  return items;
}
function createCard(item){
  const d=document.createElement('div');
  d.className='card';
  const mm=M[String(item.i)]||{};
  d.innerHTML=`
    <div class="card-meta">
      <span class="card-id">No.${String(item.i).padStart(3,'0')}</span>
      <span class="card-cat">${esc(item.c)}</span>
    </div>
    <div class="card-prompt">${fmt(item.p,q)}</div>
    <div class="supp">
      <div class="supp-row">
        <span class="supp-lbl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>特徴</span>
        <span class="supp-txt">${esc(mm.f||'')}</span>
      </div>
      <div class="supp-row">
        <span class="supp-lbl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>用途</span>
        <span class="supp-txt">${esc(mm.u||'')}</span>
      </div>
    </div>
    <button class="btn-copy">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      プロンプトをコピー
    </button>`;
  const btn=d.querySelector('.btn-copy');
  btn.addEventListener('click',()=>{
    navigator.clipboard.writeText(item.p).then(()=>{
      btn.classList.add('ok');
      btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>コピー完了！';
      setTimeout(()=>{btn.classList.remove('ok');btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>プロンプトをコピー'},2000);
    });
  });
  return d;
}
function render(){
  const area=document.getElementById('content');
  const items=filtered();
  document.getElementById('cnt').textContent=items.length;
  area.className='';
  if(!items.length){area.innerHTML='<div class="empty"><p>該当するプロンプトが見つかりませんでした</p></div>';return}
  area.innerHTML='';
  if(q){
    const info=document.createElement('div');
    info.className='search-info';
    info.innerHTML=`「<strong>${esc(q)}</strong>」の検索結果：<strong>${items.length}</strong> 件`;
    area.appendChild(info);
    const g=document.createElement('div');g.className='grid';
    items.forEach(item=>g.appendChild(createCard(item)));
    area.appendChild(g);
    return;
  }
  if(cat!=='all'){
    const h=document.createElement('div');h.className='sec-hdr';
    h.innerHTML=`<h2>${esc(cat)}</h2><span class="sc">${items.length}件</span>`;
    area.appendChild(h);
    const g=document.createElement('div');g.className='grid';
    items.forEach(item=>g.appendChild(createCard(item)));
    area.appendChild(g);
    return;
  }
  area.className='all-view';
  cats.forEach(c=>{
    const items2=catMap[c.name]||[];
    const blk=document.createElement('div');blk.className='blk';
    blk.innerHTML=`<div class="blk-hdr"><span class="sn">Section ${c.sec}</span><h3>${esc(c.name)}</h3><span style="margin-left:auto;font-size:12px;color:var(--text-dim)">${items2.length}件</span></div>`;
    const g=document.createElement('div');g.className='grid';
    items2.forEach(item=>g.appendChild(createCard(item)));
    blk.appendChild(g);
    area.appendChild(blk);
  });
}

// サイドバー構築
const cl=document.getElementById('cat-list');
const allBtn=document.createElement('button');
allBtn.className='cat-btn active';allBtn.dataset.cat='all';
allBtn.innerHTML='<span class="cn">全</span>すべて<span class="cc">500</span>';
allBtn.addEventListener('click',()=>{cat='all';q='';document.getElementById('search').value='';uActive();buildChips();render()});
cl.insertBefore(allBtn,cl.firstChild);
cats.forEach(c=>{
  const b=document.createElement('button');
  b.className='cat-btn';b.dataset.cat=c.name;
  b.innerHTML=`<span class="cn">${c.sec}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.name)}</span><span class="cc">${catMap[c.name].length}</span>`;
  b.addEventListener('click',()=>{cat=c.name;q='';document.getElementById('search').value='';uActive();buildChips();render();window.scrollTo(0,0)});
  cl.appendChild(b);
});

// モバイルchips構築
function buildChips(){
  const bar=document.getElementById('chips');
  bar.innerHTML='';
  const ac=document.createElement('button');
  ac.className='chip'+(cat==='all'&&!q?' active':'');ac.dataset.cat='all';ac.textContent='すべて';
  ac.addEventListener('click',()=>{cat='all';q='';document.getElementById('search').value='';uActive();buildChips();render();window.scrollTo(0,0)});
  bar.appendChild(ac);
  cats.forEach(c=>{
    const ch=document.createElement('button');
    ch.className='chip'+(cat===c.name&&!q?' active':'');ch.dataset.cat=c.name;ch.textContent=c.name;
    ch.addEventListener('click',()=>{cat=c.name;q='';document.getElementById('search').value='';uActive();buildChips();render();window.scrollTo(0,0);ch.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'})});
    bar.appendChild(ch);
  });
}

// 検索
document.getElementById('search').addEventListener('input',e=>{q=e.target.value.trim();cat='all';uActive();buildChips();render()});

// INIT
buildChips();
render();

</script>
