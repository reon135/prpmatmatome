<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロンプトギャラリー｜500選</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --accent: #c8a96e;
    --accent2: #7c6fcd;
    --text: #e8e6e1;
    --text-muted: #8a8880;
    --text-dim: #5a5856;
    --copy-success: #5cb87a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .logo span {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    margin-left: 8px;
  }

  .search-wrap {
    flex: 1;
    max-width: 420px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search::placeholder { color: var(--text-dim); }
  #search:focus { border-color: var(--accent); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .count-badge strong {
    color: var(--accent);
    font-weight: 500;
  }

  /* ─── LAYOUT ─── */
  .layout {
    display: flex;
    min-height: calc(100vh - 64px);
  }

  /* ─── SIDEBAR ─── */
  aside {
    width: 240px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
  }

  .sidebar-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    padding: 0 20px 10px;
    font-weight: 400;
  }

  .cat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 20px;
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 300;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }

  .cat-btn:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .cat-btn.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(200,169,110,0.06);
  }

  .cat-btn .cat-num {
    font-size: 10px;
    color: var(--text-dim);
    min-width: 24px;
    font-weight: 400;
  }

  .cat-btn .cat-count {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 1px 6px;
    border-radius: 10px;
  }

  .cat-btn.active .cat-count {
    background: rgba(200,169,110,0.15);
    color: var(--accent);
  }

  /* ─── MAIN ─── */
  main {
    flex: 1;
    padding: 32px;
    overflow-y: auto;
    min-width: 0;
  }

  .section-header {
    margin-bottom: 24px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .section-header h2 {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }

  .section-header .sec-count {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ─── GRID ─── */
  .prompt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ─── CARD ─── */
  .prompt-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .prompt-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .prompt-card:hover {
    border-color: rgba(200,169,110,0.3);
    transform: translateY(-2px);
  }

  .prompt-card:hover::before {
    opacity: 1;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-id {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
    font-variant-numeric: tabular-nums;
  }

  .card-cat {
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--text-muted);
  }

  .card-prompt {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text);
    font-weight: 300;
    flex: 1;
  }

  .card-prompt .bracket {
    color: var(--accent);
    font-weight: 500;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-copy {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.2);
    color: var(--accent);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
    justify-content: center;
  }

  .btn-copy:hover {
    background: rgba(200,169,110,0.2);
    border-color: rgba(200,169,110,0.4);
  }

  .btn-copy.copied {
    background: rgba(92,184,122,0.15);
    border-color: rgba(92,184,122,0.3);
    color: var(--copy-success);
  }

  /* ─── ALL SECTIONS VIEW ─── */
  .all-view .section-block {
    margin-bottom: 48px;
  }

  .all-view .section-block-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .all-view .section-block-header h3 {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    font-weight: 600;
  }

  .all-view .section-block-header .sec-num {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* ─── SEARCH RESULTS ─── */
  .search-info {
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }

  .search-info strong { color: var(--accent); }

  /* ─── EMPTY ─── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .empty svg { margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 14px; }

  /* ─── SCROLLBAR ─── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ─── HIGHLIGHT ─── */
  mark {
    background: rgba(200,169,110,0.25);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ─── SUPPLEMENT ─── */
  .card-supplement {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    margin-top: 2px;
  }

  .supp-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .supp-label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
    padding-top: 1px;
    min-width: 38px;
    letter-spacing: 0.03em;
  }

  .supp-text {
    font-size: 11.5px;
    line-height: 1.65;
    color: var(--text-muted);
    font-weight: 300;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: -2px;
  }

  .tag {
    font-size: 10px;
    background: rgba(124,111,205,0.12);
    border: 1px solid rgba(124,111,205,0.2);
    color: #a89be0;
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 400;
  }

  /* ─── MOBILE DRAWER ─── */
  .drawer-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    backdrop-filter: blur(4px);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { opacity: 1; }

  .drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 280px;
    background: var(--surface);
    z-index: 201;
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    padding: 0 0 80px;
    border-right: 1px solid var(--border);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .drawer-header .drawer-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    color: var(--accent);
  }
  .btn-drawer-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    display: flex;
    align-items: center;
  }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(22,22,26,0.97);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(16px);
    z-index: 150;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
  }
  .bottom-nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 10px;
    padding: 6px 16px;
    border-radius: 10px;
    transition: all 0.15s;
    flex: 1;
  }
  .bottom-nav-btn.active {
    color: var(--accent);
    background: rgba(200,169,110,0.08);
  }
  .bottom-nav-btn svg { flex-shrink: 0; }

  /* ─── MOBILE SEARCH BAR ─── */
  .mobile-search-bar {
    display: none;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 56px;
    z-index: 90;
  }
  .mobile-search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px 9px 36px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .mobile-search-bar input:focus { border-color: var(--accent); }
  .mobile-search-bar .ms-icon {
    position: absolute;
    left: 28px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }
  .mobile-search-wrap { position: relative; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    /* サイドバー非表示 → ドロワーに */
    aside { display: none; }

    /* ヘッダー調整 */
    header {
      height: 56px;
      padding: 0 16px;
      gap: 12px;
    }
    .logo { font-size: 15px; }
    .logo span { display: none; }
    .search-wrap { display: none; }
    .count-badge { font-size: 11px; padding: 3px 10px; }

    /* ハンバーガーボタン */
    .btn-hamburger { display: flex !important; }

    /* モバイル検索バー */
    .mobile-search-bar { display: block; }

    /* ボトムナビ */
    .bottom-nav { display: flex; }

    /* メインコンテンツ */
    .layout { min-height: calc(100vh - 56px); }
    main {
      padding: 16px 12px 80px;
    }
    .prompt-grid { grid-template-columns: 1fr; gap: 12px; }

    /* カード調整 */
    .prompt-card { padding: 16px; }
    .supp-text { font-size: 11px; }

    /* ドロワー表示 */
    .drawer-overlay { display: block; pointer-events: none; }
    .drawer-overlay.open { pointer-events: auto; }
    .drawer { display: block; }
  }

</style>
</head>
<body>

<header>
  <div class="logo">
    プロンプトギャラリー
    <span>500選</span>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search" placeholder="プロンプトを検索…" autocomplete="off">
  </div>
  <div class="header-right">
    <div class="count-badge">
      <strong id="visible-count">500</strong> / 500
    </div>
    <button class="btn-hamburger" id="btn-hamburger" style="display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;align-items:center;justify-content:center;" aria-label="メニュー">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</header>

<!-- モバイル検索バー -->
<div class="mobile-search-bar">
  <div class="mobile-search-wrap">
    <svg class="ms-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="mobile-search" placeholder="プロンプトを検索…" autocomplete="off">
  </div>
</div>

<!-- ドロワーオーバーレイ -->
<div class="drawer-overlay" id="drawer-overlay"></div>

<!-- ドロワー -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">カテゴリー</span>
    <button class="btn-drawer-close" id="btn-drawer-close" aria-label="閉じる">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div id="drawer-cat-list"></div>
</div>

<!-- ボトムナビ -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bottom-nav-btn active" id="bnav-all" data-action="all">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    すべて
  </button>
  <button class="bottom-nav-btn" id="bnav-menu" data-action="menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
    カテゴリ
  </button>
  <button class="bottom-nav-btn" id="bnav-top" data-action="top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
    トップへ
  </button>
</nav>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-title">カテゴリー</div>
    <button class="cat-btn active" data-cat="all">
      <span class="cat-num">全</span>
      すべて
      <span class="cat-count">500</span>
    </button>
    <div id="cat-list"></div>
  </aside>

  <main id="main-content">
    <div id="content-area"></div>
  </main>

</script>
<script>
// ─── STATE ───
let currentCat = 'all';
let searchQuery = '';
let copyTimeout = null;

// ─── CATEGORIES ───
const categories = [];
const catMap = {};
PROMPTS.forEach(p => {
  if (!catMap[p.category]) {
    catMap[p.category] = [];
    categories.push({ name: p.category, section_no: p.section_no });
  }
  catMap[p.category].push(p);
});

// ─── BUILD SIDEBAR ───
const catList = document.getElementById('cat-list');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'cat-btn';
  btn.dataset.cat = cat.name;
  btn.innerHTML = `
    <span class="cat-num">${cat.section_no}</span>
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat.name}</span>
    <span class="cat-count">${catMap[cat.name].length}</span>
  `;
  btn.addEventListener('click', () => {
    currentCat = cat.name;
    searchQuery = '';
    document.getElementById('search').value = '';
    updateActive();
    render();
  });
  catList.appendChild(btn);
});

// ─── SEARCH ───
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  currentCat = 'all';
  updateActive();
  render();
});

function updateActive() {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === currentCat && !searchQuery);
  });
}

// ─── FILTER ───
function getFiltered() {
  let items = currentCat === 'all' ? PROMPTS : catMap[currentCat] || [];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    items = PROMPTS.filter(p =>
      p.prompt.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      p.title.toLowerCase().includes(q)
    );
  }
  return items;
}

// ─── HIGHLIGHT ───
function highlight(text, query) {
  if (!query) return escHtml(text);
  const escaped = escHtml(text);
  const q = escHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(q, 'gi'), m => `<mark>${m}</mark>`);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatPrompt(prompt, query) {
  // Highlight 【】 bracket
  let html = highlight(prompt, query);
  html = html.replace(/【】/g, '<span class="bracket">【　　】</span>');
  return html;
}

// ─── CARD ───
function createCard(item) {
  const card = document.createElement('div');
  card.className = 'prompt-card';
  const m = META[String(item.id)] || {};
  const feature = m.feature || '';
  const usage = m.usage || '';
  const tags = (m.tags || []);
  const tagsHtml = tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('');

  card.innerHTML = `
    <div class="card-meta">
      <span class="card-id">No.${String(item.id).padStart(3,'0')}</span>
      <span class="card-cat">${escHtml(item.category)}</span>
    </div>
    <div class="card-prompt">${formatPrompt(item.prompt, searchQuery)}</div>
    ${tags.length ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    <div class="card-supplement">
      <div class="supp-row">
        <span class="supp-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          特徴
        </span>
        <span class="supp-text">${escHtml(feature)}</span>
      </div>
      <div class="supp-row">
        <span class="supp-label">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          用途
        </span>
        <span class="supp-text">${escHtml(usage)}</span>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn-copy">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        プロンプトをコピー
      </button>
    </div>
  `;

  const copyBtn = card.querySelector('.btn-copy');
  copyBtn.addEventListener('click', () => {
    const text = item.prompt;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = `
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        コピー完了！
      `;
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.innerHTML = `
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          プロンプトをコピー
        `;
      }, 2000);
    });
  });

  return card;
}

// ─── RENDER ───
function render() {
  const area = document.getElementById('content-area');
  const filtered = getFiltered();

  document.getElementById('visible-count').textContent = filtered.length;

  if (filtered.length === 0) {
    area.innerHTML = `
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>「${escHtml(searchQuery)}」に一致するプロンプトは見つかりませんでした</p>
      </div>
    `;
    return;
  }

  // Search mode: flat grid
  if (searchQuery) {
    area.innerHTML = '';
    const info = document.createElement('div');
    info.className = 'search-info';
    info.innerHTML = `「<strong>${escHtml(searchQuery)}</strong>」の検索結果：<strong>${filtered.length}</strong> 件`;
    area.appendChild(info);

    const grid = document.createElement('div');
    grid.className = 'prompt-grid';
    filtered.forEach(item => grid.appendChild(createCard(item)));
    area.appendChild(grid);
    return;
  }

  // Category mode
  if (currentCat !== 'all') {
    area.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <h2>${escHtml(currentCat)}</h2>
      <span class="sec-count">${filtered.length}件</span>
    `;
    area.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'prompt-grid';
    filtered.forEach(item => grid.appendChild(createCard(item)));
    area.appendChild(grid);
    return;
  }

  // All mode: grouped by category
  area.className = 'all-view';
  area.innerHTML = '';

  categories.forEach(cat => {
    const items = catMap[cat.name] || [];
    const block = document.createElement('div');
    block.className = 'section-block';

    const blockHeader = document.createElement('div');
    blockHeader.className = 'section-block-header';
    blockHeader.innerHTML = `
      <span class="sec-num">Section ${cat.section_no}</span>
      <h3>${escHtml(cat.name)}</h3>
      <span style="margin-left:auto;font-size:12px;color:var(--text-dim)">${items.length}件</span>
    `;
    block.appendChild(blockHeader);

    const grid = document.createElement('div');
    grid.className = 'prompt-grid';
    items.forEach(item => grid.appendChild(createCard(item)));
    block.appendChild(grid);

    area.appendChild(block);
  });
}

// ─── "ALL" BUTTON ───
document.querySelector('.cat-btn[data-cat="all"]').addEventListener('click', () => {
  currentCat = 'all';
  searchQuery = '';
  document.getElementById('search').value = '';
  updateActive();
  render();
});

// ─── MOBILE UI ───
function isMobile() { return window.innerWidth <= 768; }

// ドロワー開閉
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('btn-hamburger').addEventListener('click', openDrawer);
document.getElementById('btn-drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

// ドロワー内カテゴリリスト生成
function buildDrawerCatList() {
  const list = document.getElementById('drawer-cat-list');
  list.innerHTML = '';

  // 「すべて」ボタン
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn' + (currentCat === 'all' ? ' active' : '');
  allBtn.dataset.cat = 'all';
  allBtn.innerHTML = `<span class="cat-num">全</span><span style="flex:1">すべて</span><span class="cat-count">500</span>`;
  allBtn.addEventListener('click', () => {
    currentCat = 'all';
    searchQuery = '';
    document.getElementById('search').value = '';
    document.getElementById('mobile-search').value = '';
    updateActive();
    updateBottomNav();
    buildDrawerCatList();
    closeDrawer();
    render();
    window.scrollTo(0,0);
  });
  list.appendChild(allBtn);

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (currentCat === cat.name ? ' active' : '');
    btn.dataset.cat = cat.name;
    btn.innerHTML = `
      <span class="cat-num">${cat.section_no}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat.name}</span>
      <span class="cat-count">${catMap[cat.name].length}</span>
    `;
    btn.addEventListener('click', () => {
      currentCat = cat.name;
      searchQuery = '';
      document.getElementById('search').value = '';
      document.getElementById('mobile-search').value = '';
      updateActive();
      updateBottomNav();
      buildDrawerCatList();
      closeDrawer();
      render();
      window.scrollTo(0,0);
    });
    list.appendChild(btn);
  });
}

// ボトムナビ状態更新
function updateBottomNav() {
  document.getElementById('bnav-all').classList.toggle('active', currentCat === 'all' && !searchQuery);
  document.getElementById('bnav-menu').classList.toggle('active', false);
}

// ボトムナビボタン
document.getElementById('bnav-all').addEventListener('click', () => {
  currentCat = 'all';
  searchQuery = '';
  document.getElementById('search').value = '';
  document.getElementById('mobile-search').value = '';
  updateActive();
  updateBottomNav();
  render();
  window.scrollTo(0,0);
});
document.getElementById('bnav-menu').addEventListener('click', () => {
  buildDrawerCatList();
  openDrawer();
});
document.getElementById('bnav-top').addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// モバイル検索
document.getElementById('mobile-search').addEventListener('input', (e) => {
  searchQuery = e.target.value.trim();
  document.getElementById('search').value = searchQuery;
  currentCat = 'all';
  updateActive();
  updateBottomNav();
  render();
});

// ─── INIT ───
render();
</script>
</body>
</html>
